name: windows-binary

on: [push]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dioxus CLI
        shell: pwsh
        run: |
          curl -sSL https://dioxus.dev/install.sh | bash
          dx --version

      - name: Build & bundle (Windows installer)
        shell: pwsh
        env:
          RUST_BACKTRACE: full
        run: |
          dx bundle --release --desktop --package-types "exe"

      - name: Upload installer to release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bundle/windows/*.exe
