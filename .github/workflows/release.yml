name: build-binary

on: [push]

jobs:
  build-appimage:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - run: sudo apt-get update

      - run: sudo apt-get install libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld libgtk-4-dev libgtk-3-dev pkg-config libglib2.0-dev libpango1.0-dev libcairo2-dev libgdk-pixbuf-2.0-dev libfuse2 patchelf libasound2-dev

      - run: curl -sSL https://dioxus.dev/install.sh | bash

      - name: DX BUILD
        env:
          RUST_BACKTRACE: full

        run: |
          dx bundle --release --desktop --package-types "appimage"

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: target/dx/lmusic/bundle/linux/bundle/appimage/Lmusic_0.1.0_amd64.AppImage





