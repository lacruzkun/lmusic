name: build-binary

on: [push]

jobs:
  build-appimage:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - run: sudo apt-get update

      - run: sudo apt-get install libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld libgtk-4-dev libgtk-3-dev

      - run: curl -sSL https://dioxus.dev/install.sh | bash


      - run: dx bundle --desktop --package-types "appimage"





